<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Code - SSE Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f0f23;
            color: #cccccc;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #ffffff;
            font-size: 2.5em;
            font-weight: 300;
            margin-bottom: 10px;
        }

        .header p {
            color: #888;
            font-size: 1.1em;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #1a1a2e;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            max-height: 500px;
        }

        .message {
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 8px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.thinking {
            background: #404040;
            color: #cccccc;
            border-left: 4px solid #666;
            font-style: italic;
        }

        .message.thinking::before {
            content: "🤔 ";
        }

        .message.text {
            background: #16213e;
            color: #ffffff;
            border-left: 4px solid #4fc3f7;
        }

        .message.text::before {
            content: "🤖 ";
        }

        .message.tool-use {
            background: #2d1b69;
            color: #b39ddb;
            border-left: 4px solid #7e57c2;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .message.tool-use::before {
            content: "⚙️ ";
        }

        .message.tool-result {
            background: #1b5e20;
            color: #c8e6c9;
            border-left: 4px solid #4caf50;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .message.tool-result::before {
            content: "✅ ";
        }

        .message.error {
            background: #b71c1c;
            color: #ffcdd2;
            border-left: 4px solid #f44336;
        }

        .message.error::before {
            content: "❌ ";
        }

        .message.user {
            background: #0f4c75;
            color: #ffffff;
            border-left: 4px solid #2196f3;
            margin-left: auto;
            max-width: 80%;
        }

        .message.user::before {
            content: "👤 ";
        }

        .input-container {
            padding: 20px;
            border-top: 1px solid #333;
            background: #16213e;
        }

        .input-form {
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid #444;
            border-radius: 6px;
            background: #0f0f23;
            color: #ffffff;
            font-size: 16px;
        }

        .input-field:focus {
            outline: none;
            border-color: #4fc3f7;
            box-shadow: 0 0 0 2px rgba(79, 195, 247, 0.2);
        }

        .send-button {
            padding: 12px 24px;
            background: #4fc3f7;
            color: #0f0f23;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        .send-button:hover {
            background: #29b6f6;
        }

        .send-button:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
        }

        .status {
            padding: 10px 20px;
            text-align: center;
            font-size: 0.9em;
            color: #888;
            border-top: 1px solid #333;
            background: #1a1a2e;
        }

        .status.connected {
            color: #4caf50;
        }

        .status.error {
            color: #f44336;
        }

        pre {
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 4px;
            border-radius: 3px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Claude Code</h1>
            <p>AI Assistant with Real-time Streaming</p>
        </div>

        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="message text">
                    <strong>Claude:</strong> Hello! I'm Claude Code, ready to help you with coding tasks and more. What would you like to work on today?
                </div>
            </div>

            <div class="input-container">
                <form class="input-form" id="chatForm">
                    <input 
                        type="text" 
                        id="promptInput" 
                        class="input-field" 
                        placeholder="Ask me anything..." 
                        autofocus
                    >
                    <button type="submit" class="send-button" id="sendButton">Send</button>
                </form>
            </div>

            <div class="status" id="status">Ready to chat</div>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messages');
        const promptInput = document.getElementById('promptInput');
        const sendButton = document.getElementById('sendButton');
        const statusDiv = document.getElementById('status');
        const chatForm = document.getElementById('chatForm');
        
        let eventSource = null;

        function addMessage(type, content, isHtml = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            
            if (isHtml) {
                messageDiv.innerHTML = content;
            } else {
                messageDiv.textContent = content;
            }
            
            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function setStatus(message, type = '') {
            statusDiv.textContent = message;
            statusDiv.className = `status ${type}`;
        }

        function startChat(prompt) {
            if (eventSource) {
                eventSource.close();
            }

            // Add user message
            addMessage('user', prompt);

            // Disable input
            sendButton.disabled = true;
            promptInput.disabled = true;
            setStatus('Connecting...', 'connecting');

            const encodedPrompt = encodeURIComponent(prompt);
            eventSource = new EventSource(`/chat?prompt=${encodedPrompt}`);

            eventSource.onopen = function() {
                setStatus('Connected - Claude is responding...', 'connected');
            };

            eventSource.onmessage = function(event) {
                try {
                    const data = JSON.parse(event.data);
                    
                    switch (data.type) {
                        case 'thinking':
                            addMessage('thinking', data.text);
                            break;
                        case 'text':
                            addMessage('text', data.text);
                            break;
                        case 'tool_use':
                            addMessage('tool-use', `Using tool: ${data.tool_name} (${data.tool_id})\nInput: ${JSON.stringify(data.input, null, 2)}`);
                            break;
                        case 'tool_result':
                            addMessage('tool-result', `Tool result (${data.tool_id}):\n${data.result}`);
                            break;
                        case 'done':
                            setStatus('Ready for next message', '');
                            sendButton.disabled = false;
                            promptInput.disabled = false;
                            promptInput.focus();
                            eventSource.close();
                            break;
                        case 'error':
                            addMessage('error', `Error: ${data.message}`);
                            setStatus('Error occurred', 'error');
                            sendButton.disabled = false;
                            promptInput.disabled = false;
                            eventSource.close();
                            break;
                    }
                } catch (e) {
                    console.error('Error parsing SSE data:', e);
                    addMessage('error', 'Failed to parse response');
                }
            };

            eventSource.onerror = function(event) {
                console.error('SSE error:', event);
                setStatus('Connection error', 'error');
                sendButton.disabled = false;
                promptInput.disabled = false;
                if (eventSource) {
                    eventSource.close();
                }
            };
        }

        chatForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const prompt = promptInput.value.trim();
            if (prompt) {
                promptInput.value = '';
                startChat(prompt);
            }
        });

        // Handle Enter key
        promptInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                chatForm.dispatchEvent(new Event('submit'));
            }
        });

        // Initial focus
        promptInput.focus();
    </script>
</body>
</html>
